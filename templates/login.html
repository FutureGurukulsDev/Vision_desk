{% extends "base.html" %}
{% set body_class = "login-body" %}

{% block extra_css %}
<link href="{{ url_for('static', filename='css/login.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<main class="login-shell">
    <div class="login-card card shadow-sm">
        <div class="card-body">
            <div class="text-center mb-4">
                <h1 class="h3 mb-1">VisionDesk Login</h1>
                <p class="text-muted">Use your user name or email to sign in.</p>
            </div>
            {% if error %}
            <div class="alert alert-danger" role="alert">{{ error }}</div>
            {% endif %}
            <form method="post" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="identifier">User Name or Email</label>
                    <input type="text" class="form-control form-control-lg" id="identifier" name="identifier" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Sign In</button>
            </form>
            <div class="mt-4 text-center text-muted small">
                No account? Use your existing reception credentials.
            </div>
        </div>
    </div>
</main>
{% endblock %}
